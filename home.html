<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Geist", sans-serif;
            font-style: normal;
        }
    </style>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-slate-100">
    <header>
        <div class="navbar flex flex-col md:flex-row justify-between gap-2 bg-base-100 shadow-sm px-10 py-4 bg-white">
            <div class="flex">
                <img class="w-9 h-9" src="./assets/github-logo.png" alt="GitHub Logo">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>               
                        <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" id="search-input" required placeholder="Search Issues"/>
                </label>
                <button id="handleSearch()" class="btn btn-primary"> <i class="fa-solid fa-magnifying-glass"></i> New Issue</button>
            </div>
        </div>
    </header>
    <main>
        <div class="flex justify-center md:justify-start gap-4 mt-15 mb-6 p-6 bg-white rounded-md shadow-md">
            <button onclick="loadIssues('all')" id="all-button" class="btn btn-primary md:w-30">All</button>

            <button onclick="loadIssues('open')" id="open-button" class="btn btn-primary md:w-30">Open</button>
            
            <button onclick="loadIssues('closed')" id="closed-button" class="btn btn-primary md:w-30">Closed</button>
        </div>
        <div class="flex flex-col md:flex-row items-center justify-between p-6 bg-white rounded-md shadow-lg gap-4">
            <div class="flex items-center justify-center gap-3">
                <div class="flex items-center justify-center rounded-full w-11 h-11 bg-blue-200">
                    <img class="w-8 h-8" src="./assets/Aperture.png" alt="Aperture Image">
                </div>
                <div class="flex flex-col">
                    <h2 class="font-semibold text-lg md:text-xl text-gray-900"><span id="issue-count">0</span> Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex flex-row items-center justify-center gap-4">
                <div class="w-3 h-3 rounded-full bg-green-600"></div>
                <p>Open</p>
                <div class="w-3 h-3 rounded-full bg-violet-800"></div>
                <p>Closed</p>
            </div>
        </div>
        <div id="spinn" class="flex flex-col items-center justify-center p-6">
            <span class="loading loading-spinner loading-xl"></span>
            <p>Data is loading...</p>
      </div>
      <div
        id="issue-container"
        class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4 p-6 bg-[#FBFBFB] shadow-md hidden"></div>

        <dialog id="modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
          <div id="modal-text"></div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>

    <script src="./home.js"></script>
</body>
</html>
